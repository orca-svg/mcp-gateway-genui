name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version or publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Go-live gate: versioning and publishing stay off until the maintainer
      # is ready (npm org `mcp-gen-ui` created, NPM_TOKEN added, repo public).
      # Flip on by setting the repository variable RELEASE_ENABLED=true. Until
      # then this step is skipped so `main` stays green and nothing is published
      # ahead of the human go-live step (issue #5). See docs/git-workflow.md.
      - name: Create release PR or publish to npm
        if: ${{ vars.RELEASE_ENABLED == 'true' }}
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm publish -r --provenance --access public --no-git-checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
