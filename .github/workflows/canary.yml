name: Canary

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: canary
  cancel-in-progress: false

jobs:
  canary:
    name: Live API smoke check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run canary smoke checks
        # Secrets absent (public forks, pre-activation) → script exits 0 (neutral).
        # Runs the production adapters (transport, envelope parsing, normalization,
        # provenance and schema validation). Any configured source that fails →
        # script exits 1 and files an AFK issue.
        run: node packages/canary-check/dist/run.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Shared data.go.kr key — Bokjiro/Subsidy per-source overrides take precedence.
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          # Per-source overrides (optional — used when different keys are needed per API)
          YOUTH_CENTER_API_KEY: ${{ secrets.YOUTH_CENTER_API_KEY }}
          BOKJIRO_API_KEY: ${{ secrets.BOKJIRO_API_KEY }}
          SUBSIDY24_API_KEY: ${{ secrets.SUBSIDY24_API_KEY }}
